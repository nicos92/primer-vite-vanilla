name: Deploy Vite site to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      # 🧩 Variables públicas (config)
      VITE_BASE_URL: ${{ vars.BASE_URL }}
      # VITE_FORMSPREE_URL: ${{ vars.FORMSPREE_URL }}

      # 🔐 Secret (solo si realmente lo usás en build)
      # GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 🔥 IMPORTANTE: esto falla si Pages no está habilitado
      - name: Setup Pages
        uses: actions/configure-pages@v6

      # 🔥 Build con variables disponibles en Vite
      - name: Build
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
